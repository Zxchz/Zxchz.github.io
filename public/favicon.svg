<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bend" x1="2" y1="60" x2="60" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="0.52" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#7CFF67"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.9"/>
    </filter>
    <filter id="zshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.3"/>
    </filter>
    <clipPath id="round"><rect width="64" height="64" rx="15"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="64" height="64" fill="#070709"/>
    <g fill="none" stroke="url(#bend)" stroke-linecap="round" filter="url(#glow)">
      <path d="M-8 50 C 14 38, 28 30, 72 6" stroke-width="9" opacity="0.95"/>
      <path d="M-8 68 C 18 52, 36 44, 76 18" stroke-width="4.5" opacity="0.65"/>
    </g>
    <!-- Z monogram: dark shadow for legibility, then crisp white mark -->
    <path d="M18 19 H46 L18 45 H46" fill="none" stroke="#05060a" stroke-opacity="0.55"
          stroke-width="9.5" stroke-linejoin="miter" stroke-miterlimit="6" filter="url(#zshadow)"/>
    <path d="M18 19 H46 L18 45 H46" fill="none" stroke="#ffffff"
          stroke-width="7" stroke-linejoin="miter" stroke-miterlimit="6"/>
    <rect width="64" height="64" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  </g>
</svg>
